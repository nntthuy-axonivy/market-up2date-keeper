name: Checking dangling commits by Trufflehog

permissions:
  contents: read
on:
  workflow_dispatch:
    inputs:
      workingOrgs:
        description: 'Comma-separated orgs to scan'
        default: 'axonivy-market'
      workingRepos:
        description: 'Comma-separated list of repo names (optional)'
        default: ''

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      repo-matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Generate matrix dynamically
        id: set-matrix
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ORG="${{ github.event.inputs.workingOrgs }}"
          INPUT_REPOS="${{ github.event.inputs.workingRepos }}"

          # Get repo names as a JSON array          
          if [ -n "$INPUT_REPOS" ]; then
            REPOS=$(jq -R 'split(",")' <<< "$INPUT_REPOS")
          else
            REPOS=$(gh repo list "$ORG" --limit 1000 --json name -q '[.[].name]')
            if [ -z "$REPOS" ] || [ "$REPOS" = "[]" ]; then
              echo "❌ No repos found or missing permissions"
              exit 1
            fi
            echo "📦 Found repos: $REPOS"
          fi

          # Build matrix JSON object
          MATRIX_JSON=$(jq -n --argjson repos "$REPOS" '{ include: $repos }')

          echo "matrix<<EOF" >> $GITHUB_OUTPUT
          echo "$MATRIX_JSON" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  truffle-scan:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJson(needs.prepare.outputs.repo-matrix).include }}
    env:
      ORG: ${{ github.event.inputs.workingOrgs }}
    steps:
      - uses: actions/checkout@v4
      - name: Install TruffleHog
        run: pip install trufflehog jq
      - name: Run TruffleHog
        run: |
          REPO="${{ matrix.repo }}"
          REPORT="trufflehog-reports/${ORG}__${REPO}.json"
          mkdir -p trufflehog-reports
          REPO_URL="https://${GH_TOKEN}@github.com/$ORG/$REPO.git"
          rm -rf "$REPO"

          echo "🚨 Scanning $ORG/$REPO ..."

          echo "▶️ Full scan (timeout after 2 minutes)..."
          timeout 2m trufflehog --json --regex \
            --rules ./trufflehog-custom-rules.json \
            "$REPO_URL" | jq '.' > "$REPORT" 2>/dev/null

          EXIT_CODE=$?

          if [ $EXIT_CODE -eq 124 ]; then
            echo "⏱️ Full scan timed out → fallback to latest 100 commits"
            rm -f "$REPORT"

            timeout 2m trufflehog --json --regex \
              --rules ./trufflehog-custom-rules.json \
              --max-depth 100 \
              "$REPO_URL" | jq '.' > "$REPORT" || true
          else
            echo "✅ Full scan completed normally"
          fi

          echo "📄 Saved: $REPORT"

  collect-artifacts:
    needs: truffle-scan
    runs-on: ubuntu-latest
    steps:
      - name: Download all TruffleHog artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-reports

      - name: Combine all reports into one zip
        run: |
          cd all-reports
          zip -r ../trufflehog-all-repos.zip .
          cd ..

      - name: Upload final combined artifact
        uses: actions/upload-artifact@v4
        with:
          name: trufflehog-all-repos
          path: trufflehog-all-repos.zip
