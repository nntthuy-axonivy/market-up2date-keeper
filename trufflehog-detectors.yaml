# Custom detectors configuration for TruffleHog v3+ CLI (using --config)
# See: https://docs.trufflesecurity.com/custom-detectors
# Designed to replace legacy --rules JSON usage.
concurrency: "8"
detectors:
  - name: generic_sensitive_assignment
    description: Generic sensitive variable assignment (password/secret/token/api key/private key)
    keywords:
      - password
      - secret
      - token
      - key
      - private
    regex:
      secretAssignment: "(?i)\b[A-Za-z0-9_-]*(?:pass(?:word)?|passwd|secret|token|api[_-]?key|private[_-]?key|key)[A-Za-z0-9_-]*\b\s*[:=]\s*(?:\"[^\"]+\"|'[^']+'|[^\s]+)"
    entropy: 3.2
    exclude_words:
      - example
      - test
      - dummy
  - name: value_contains_password
    description: Assignment where the value itself contains password/pass even if key generic
    keywords:
      - password
      - pass
    regex:
      valueContainsPassword: "(?i)\b[A-Za-z0-9_-]+\b\s*[:=]\s*(?:\"[^\"]*pass(?:word)?[^\"]*\"|'[^']*pass(?:word)?[^']*'|[^\s]*pass(?:word)?[^\s]*)"
    entropy: 3.0
    exclude_words:
      - example
      - test
      - dummy
  - name: connection_url_inline_password
    description: Database-style connection URL embedding a password segment user:password@host
    keywords:
      - ://
      - @
    regex:
      urlWithPassword: "(?i)\b[a-z]+://[^\s:@]+:[^\s:@]+@[^\s\"']+"
    entropy: 2.5
  - name: base64_high_entropy_token
    description: High-entropy base64-like token (>=20 chars)
    keywords:
      - token
      - key
    regex:
      base64Token: "\b[A-Za-z0-9+/]{20,}={0,3}\b"
    entropy: 4.0
    exclude_words:
      - test
      - example
# End of detectors config.
